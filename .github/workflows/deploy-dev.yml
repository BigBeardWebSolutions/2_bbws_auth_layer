name: Deploy to DEV

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'terraform/**'
      - 'scripts/**'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Package Layer
        run: |
          chmod +x scripts/package_layer.sh
          scripts/package_layer.sh

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=bbws-terraform-state-dev" \
            -backend-config="key=bbws-auth-layer/terraform.tfstate" \
            -backend-config="region=eu-west-1" \
            -backend-config="dynamodb_table=bbws-terraform-locks-dev" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file=environments/dev.tfvars -out=plan.tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply plan.tfplan
